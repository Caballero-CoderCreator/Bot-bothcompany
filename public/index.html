<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp · Both Company</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C4923A;
      --gold-dark: #A67C2E;
      --gold-light: #FDF5E6;
      --sidebar-w: 300px;
      --topbar-h: 56px;
      --bg: #F5F5F5;
      --card: #FFFFFF;
      --text: #1A1A1A;
      --muted: #888;
      --border: #E5E5E5;
      --bot-bubble: #DCF8C6;
      --client-bubble: #F0F0F0;
      --human-bubble: #FDF5E6;
    }

    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Topbar ── */
    #topbar {
      height: var(--topbar-h);
      background: linear-gradient(135deg, #1A1A2E 0%, #16213E 100%);
      display: flex; align-items: center; padding: 0 20px;
      gap: 12px; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    #topbar .logo { font-size: 20px; font-weight: 700; color: var(--gold); letter-spacing: 1px; }
    #topbar .sep { color: #444; margin: 0 4px; }
    #topbar .title { color: #ccc; font-size: 14px; }
    #status-dot { width: 10px; height: 10px; border-radius: 50%; background: #888; margin-left: auto; transition: background .3s; }
    #status-dot.online { background: #25D366; box-shadow: 0 0 6px #25D366; }
    #status-dot.offline { background: #EF4444; box-shadow: 0 0 6px #EF4444; }
    #status-label { color: #ccc; font-size: 13px; }

    /* ── Main layout ── */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* ── Left panel ── */
    #left {
      width: var(--sidebar-w);
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      flex-shrink: 0;
    }
    #left-header { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    #left-header h2 { font-size: 15px; font-weight: 600; color: var(--text); }
    #conv-count { font-size: 12px; color: var(--muted); margin-top: 2px; }

    #conv-list { flex: 1; overflow-y: auto; }
    .conv-item {
      padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border);
      transition: background .15s;
      position: relative;
    }
    .conv-item:hover { background: var(--gold-light); }
    .conv-item.active { background: var(--gold-light); border-left: 3px solid var(--gold); }
    .conv-item .ci-name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-item .ci-empresa { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .conv-item .ci-preview { font-size: 12px; color: var(--muted); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-item .ci-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
    .badge { font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: 600; }
    .badge-listo { background: var(--gold); color: #fff; }
    .badge-atencion { background: #EF4444; color: #fff; }
    .badge-bot { background: #E8F5E9; color: #2E7D32; }
    .badge-humano { background: var(--gold-light); color: var(--gold-dark); }

    /* ── QR overlay ── */
    #qr-overlay {
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      flex: 1; gap: 16px; padding: 24px; text-align: center;
    }
    #qr-overlay.visible { display: flex; }
    #qr-overlay img { border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
    #qr-overlay h3 { font-size: 18px; color: var(--text); }
    #qr-overlay p { font-size: 13px; color: var(--muted); max-width: 300px; line-height: 1.5; }

    /* ── Right panel ── */
    #right {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }

    #empty-state {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: var(--muted); gap: 10px;
    }
    #empty-state .icon { font-size: 48px; opacity: .3; }
    #empty-state p { font-size: 14px; }

    #chat-panel { flex: 1; display: none; flex-direction: column; overflow: hidden; }
    #chat-panel.visible { display: flex; }

    /* Card cliente */
    #client-card {
      padding: 14px 20px; background: var(--card); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px;
    }
    #client-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 18px; font-weight: 700; flex-shrink: 0;
    }
    #client-info { flex: 1; min-width: 0; }
    #client-name { font-weight: 700; font-size: 15px; }
    #client-empresa { font-size: 12px; color: var(--muted); }
    #client-tel { font-size: 12px; color: var(--muted); margin-top: 2px; }
    #client-crm-link { font-size: 12px; color: var(--gold); text-decoration: none; margin-top: 2px; display: inline-block; }
    #client-crm-link:hover { text-decoration: underline; }
    #handoff-controls { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-handoff {
      padding: 8px 14px; border: none; border-radius: 8px; cursor: pointer;
      font-size: 13px; font-weight: 600; transition: all .15s;
    }
    #btn-tomar { background: var(--gold); color: #fff; }
    #btn-tomar:hover { background: var(--gold-dark); }
    #btn-devolver { background: #E8F5E9; color: #2E7D32; }
    #btn-devolver:hover { background: #C8E6C9; }

    /* Messages */
    #messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 8px;
      background: #ECE5DD;
    }
    .msg { max-width: 75%; padding: 8px 12px; border-radius: 10px; font-size: 14px; line-height: 1.4; position: relative; }
    .msg .msg-time { font-size: 10px; color: var(--muted); margin-top: 4px; text-align: right; }
    .msg-cliente { background: var(--client-bubble); align-self: flex-start; border-bottom-left-radius: 2px; }
    .msg-bot { background: var(--bot-bubble); align-self: flex-end; border-bottom-right-radius: 2px; }
    .msg-humano { background: var(--human-bubble); border: 1px solid var(--gold); align-self: flex-end; border-bottom-right-radius: 2px; }
    .msg-label { font-size: 10px; font-weight: 600; color: var(--muted); margin-bottom: 2px; }

    /* Input area */
    #input-area {
      padding: 12px 16px; background: var(--card); border-top: 1px solid var(--border);
      display: flex; gap: 10px; align-items: flex-end;
    }
    #msg-input {
      flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 22px;
      font-size: 14px; resize: none; outline: none; max-height: 100px;
      font-family: inherit; line-height: 1.4;
      transition: border-color .2s;
    }
    #msg-input:focus { border-color: var(--gold); }
    #msg-input:disabled { background: #F5F5F5; color: var(--muted); cursor: not-allowed; }
    #msg-input::placeholder { color: #bbb; }
    #btn-send {
      width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer;
      background: var(--gold); color: #fff; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .15s;
    }
    #btn-send:hover { background: var(--gold-dark); }
    #btn-send:disabled { background: #ccc; cursor: not-allowed; }
    #control-status {
      text-align: center; font-size: 12px; color: var(--muted); padding: 4px 0;
      background: var(--card); border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <!-- Topbar -->
  <div id="topbar">
    <span class="logo">Both Company</span>
    <span class="sep">·</span>
    <span class="title">Panel WhatsApp</span>
    <div id="status-dot" class="offline"></div>
    <span id="status-label">Desconectado</span>
  </div>

  <!-- Main -->
  <div id="main">

    <!-- Left: lista de conversaciones -->
    <div id="left">
      <div id="left-header">
        <h2>Conversaciones</h2>
        <div id="conv-count">0 chats</div>
      </div>
      <div id="conv-list"></div>
    </div>

    <!-- Right -->
    <div id="right">
      <!-- QR overlay -->
      <div id="qr-overlay">
        <img id="qr-img" src="" alt="QR WhatsApp" width="260" height="260">
        <h3>Escanear QR para conectar</h3>
        <p>Abre WhatsApp en tu telefono &rarr; <strong>Dispositivos vinculados</strong> &rarr; <strong>Vincular dispositivo</strong></p>
      </div>

      <!-- Estado vacio -->
      <div id="empty-state">
        <div class="icon">💬</div>
        <p>Selecciona una conversacion para ver el chat</p>
      </div>

      <!-- Panel de chat activo -->
      <div id="chat-panel">
        <div id="client-card">
          <div id="client-avatar">?</div>
          <div id="client-info">
            <div id="client-name">-</div>
            <div id="client-empresa"></div>
            <div id="client-tel"></div>
            <a id="client-crm-link" href="#" target="_blank">Ver en CRM &rarr;</a>
          </div>
          <div id="handoff-controls">
            <button class="btn-handoff" id="btn-tomar">Tomar control</button>
            <button class="btn-handoff" id="btn-devolver" style="display:none">Devolver al bot</button>
          </div>
        </div>

        <div id="messages"></div>

        <div id="control-status">El bot tiene el control - Tu input esta bloqueado</div>
        <div id="input-area">
          <textarea id="msg-input" placeholder="Escribe un mensaje..." rows="1" disabled></textarea>
          <button id="btn-send" disabled>&#10148;</button>
        </div>
      </div>
    </div>
  </div>

<script>
  const socket = io()

  let conversaciones = {}
  let tomadoPorHumano = {}
  let contactosInfo = {}
  let jidActivo = null

  const CRM_BASE = 'https://crmbothcompany.netlify.app'

  const statusDot = document.getElementById('status-dot')
  const statusLabel = document.getElementById('status-label')
  const convList = document.getElementById('conv-list')
  const convCount = document.getElementById('conv-count')
  const qrOverlay = document.getElementById('qr-overlay')
  const qrImg = document.getElementById('qr-img')
  const emptyState = document.getElementById('empty-state')
  const chatPanel = document.getElementById('chat-panel')
  const messagesEl = document.getElementById('messages')
  const clientName = document.getElementById('client-name')
  const clientEmpresa = document.getElementById('client-empresa')
  const clientTel = document.getElementById('client-tel')
  const clientAvatar = document.getElementById('client-avatar')
  const clientCrmLink = document.getElementById('client-crm-link')
  const btnTomar = document.getElementById('btn-tomar')
  const btnDevolver = document.getElementById('btn-devolver')
  const msgInput = document.getElementById('msg-input')
  const btnSend = document.getElementById('btn-send')
  const controlStatus = document.getElementById('control-status')

  function formatJid(jid) { return jid.replace('@s.whatsapp.net', '') }
  function inicialLetra(t) { return t ? t.charAt(0).toUpperCase() : '?' }

  function ultimoMensaje(jid) {
    const msgs = conversaciones[jid]
    if (!msgs || msgs.length === 0) return ''
    return msgs[msgs.length - 1].texto || ''
  }

  function escapeHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/\n/g, '<br>')
  }

  function renderConvList() {
    const jids = Object.keys(conversaciones)
    convCount.textContent = jids.length + ' chat' + (jids.length !== 1 ? 's' : '')
    convList.innerHTML = ''
    jids.forEach(function(jid) {
      const info = contactosInfo[jid] || {}
      const nombre = info.nombre || formatJid(jid)
      const empresa = info.empresa || ''
      const preview = ultimoMensaje(jid)
      const tomado = tomadoPorHumano[jid]

      const div = document.createElement('div')
      div.className = 'conv-item' + (jid === jidActivo ? ' active' : '')
      div.dataset.jid = jid

      let badges = ''
      if (info.listo) badges += '<span class="badge badge-listo">Listo para cotizar</span>'
      if (info.atencion) badges += '<span class="badge badge-atencion">Atencion requerida</span>'
      badges += tomado
        ? '<span class="badge badge-humano">Contigo</span>'
        : '<span class="badge badge-bot">Con bot</span>'

      div.innerHTML = '<div class="ci-name">' + escapeHtml(nombre) + '</div>' +
        (empresa ? '<div class="ci-empresa">' + escapeHtml(empresa) + '</div>' : '') +
        '<div class="ci-preview">' + escapeHtml(preview) + '</div>' +
        '<div class="ci-badges">' + badges + '</div>'

      div.addEventListener('click', function() { abrirChat(jid) })
      convList.appendChild(div)
    })
  }

  function appendMessage(msg) {
    const div = document.createElement('div')
    let cls = 'msg msg-cliente'
    let label = ''
    if (msg.de === 'bot') { cls = 'msg msg-bot'; label = '<div class="msg-label">Bot</div>' }
    if (msg.de === 'humano') { cls = 'msg msg-humano'; label = '<div class="msg-label">Tu</div>' }
    div.className = cls
    div.innerHTML = label + escapeHtml(msg.texto) + '<div class="msg-time">' + (msg.hora || '') + '</div>'
    messagesEl.appendChild(div)
  }

  function renderMessages(jid) {
    messagesEl.innerHTML = ''
    const msgs = conversaciones[jid] || []
    msgs.forEach(function(m) { appendMessage(m) })
    messagesEl.scrollTop = messagesEl.scrollHeight
  }

  function actualizarControlesHandoff(jid) {
    const tomado = tomadoPorHumano[jid]
    if (tomado) {
      btnTomar.style.display = 'none'
      btnDevolver.style.display = 'inline-flex'
      msgInput.disabled = false
      btnSend.disabled = false
      controlStatus.textContent = 'Tu tienes el control - Puedes escribir'
    } else {
      btnTomar.style.display = 'inline-flex'
      btnDevolver.style.display = 'none'
      msgInput.disabled = true
      btnSend.disabled = true
      controlStatus.textContent = 'El bot tiene el control - Tu input esta bloqueado'
    }
  }

  function abrirChat(jid) {
    jidActivo = jid
    renderConvList()

    const info = contactosInfo[jid] || {}
    const nombre = info.nombre || formatJid(jid)

    clientName.textContent = nombre
    clientEmpresa.textContent = info.empresa || ''
    clientTel.textContent = formatJid(jid)
    clientAvatar.textContent = inicialLetra(nombre)

    if (info.clienteId) {
      clientCrmLink.href = CRM_BASE + '/cliente-perfil.html?id=' + info.clienteId
      clientCrmLink.style.display = 'inline-block'
    } else {
      clientCrmLink.style.display = 'none'
    }

    actualizarControlesHandoff(jid)
    renderMessages(jid)

    emptyState.style.display = 'none'
    qrOverlay.classList.remove('visible')
    chatPanel.classList.add('visible')
  }

  function setBotStatus(online) {
    if (online) {
      statusDot.className = 'online'
      statusLabel.textContent = 'Bot activo'
      qrOverlay.classList.remove('visible')
      if (!jidActivo) emptyState.style.display = 'flex'
    } else {
      statusDot.className = 'offline'
      statusLabel.textContent = 'Desconectado'
    }
  }

  // ── Socket events ──
  socket.on('conversaciones_iniciales', function(data) {
    conversaciones = data.conversaciones || {}
    tomadoPorHumano = data.tomadoPorHumano || {}
    contactosInfo = data.contactosInfo || {}
    renderConvList()
    if (data.botListo) setBotStatus(true)
  })

  socket.on('bot_conectado', function() { setBotStatus(true) })
  socket.on('bot_desconectado', function() { setBotStatus(false) })

  socket.on('qr_disponible', function(url) {
    qrImg.src = url
    qrOverlay.classList.add('visible')
    emptyState.style.display = 'none'
    chatPanel.classList.remove('visible')
  })

  socket.on('nuevo_mensaje', function(data) {
    var numero = data.numero, mensaje = data.mensaje, info = data.info
    if (!conversaciones[numero]) conversaciones[numero] = []
    conversaciones[numero].push(mensaje)
    if (info) contactosInfo[numero] = Object.assign({}, contactosInfo[numero], info)
    renderConvList()
    if (numero === jidActivo) {
      appendMessage(mensaje)
      messagesEl.scrollTop = messagesEl.scrollHeight
    }
  })

  socket.on('contacto_actualizado', function(data) {
    var numero = data.numero, info = data.info
    contactosInfo[numero] = Object.assign({}, contactosInfo[numero], info)
    renderConvList()
    if (numero === jidActivo) {
      clientName.textContent = info.nombre || formatJid(numero)
      clientEmpresa.textContent = info.empresa || ''
      clientAvatar.textContent = inicialLetra(info.nombre)
    }
  })

  socket.on('estado_actualizado', function(data) {
    tomadoPorHumano[data.numero] = data.tomado
    renderConvList()
    if (data.numero === jidActivo) actualizarControlesHandoff(data.numero)
  })

  socket.on('cliente_listo', function(numero) {
    if (!contactosInfo[numero]) contactosInfo[numero] = {}
    contactosInfo[numero].listo = true
    contactosInfo[numero].atencion = false
    renderConvList()
  })

  socket.on('atencion_requerida', function(numero) {
    if (!contactosInfo[numero]) contactosInfo[numero] = {}
    contactosInfo[numero].atencion = true
    renderConvList()
  })

  // ── Handoff ──
  btnTomar.addEventListener('click', function() {
    if (!jidActivo) return
    socket.emit('tomar_control', jidActivo)
  })

  btnDevolver.addEventListener('click', function() {
    if (!jidActivo) return
    socket.emit('devolver_bot', jidActivo)
    if (contactosInfo[jidActivo]) contactosInfo[jidActivo].atencion = false
    renderConvList()
  })

  // ── Enviar mensaje ──
  function enviarMensaje() {
    var texto = msgInput.value.trim()
    if (!texto || !jidActivo) return
    socket.emit('enviar_mensaje', { numero: jidActivo, texto: texto })
    msgInput.value = ''
    msgInput.style.height = 'auto'
  }

  btnSend.addEventListener('click', enviarMensaje)

  msgInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault()
      enviarMensaje()
    }
  })

  msgInput.addEventListener('input', function() {
    msgInput.style.height = 'auto'
    msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + 'px'
  })
</script>
</body>
</html>
